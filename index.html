
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Impersio - AI Search Engine</title>
    <meta name="description" content="Impersio is a free AI-powered answer search engine that provides accurate, trusted, and real-time answers to any question." />
    <meta property="og:title" content="Impersio - AI Search Engine" />
    <meta property="og:description" content="Impersio is a free AI-powered answer search engine that provides accurate, trusted, and real-time answers to any question." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#FAF8F5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%2321808D' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z' /%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- Structured Data for Google Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Impersio",
      "url": "https://impersio.me",
      "description": "Impersio is a free AI-powered answer search engine that provides accurate, trusted, and real-time answers to any question.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://impersio.me/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              serif: ['"Instrument Serif"', 'Georgia', 'serif'],
            },
            colors: {
              background: 'var(--bg-primary)', 
              sidebar: 'var(--bg-secondary)',
              surface: 'var(--surface)',    
              'surface-hover': 'var(--surface-hover)', 
              border: 'var(--border)',     
              primary: 'var(--text-primary)',    
              muted: 'var(--text-secondary)',      
              'bubble-user': 'var(--bubble-user)',
              'scira-accent': 'var(--accent-primary)', 
              'scira-accent-hover': 'var(--accent-hover)',
              'sidebar-background': 'var(--sidebar-background)',
              'sidebar-foreground': 'var(--sidebar-foreground)',
              'sidebar-primary': 'var(--sidebar-primary)',
              'sidebar-primary-foreground': 'var(--sidebar-primary-foreground)',
              'sidebar-accent': 'var(--sidebar-accent)',
              'sidebar-accent-foreground': 'var(--sidebar-accent-foreground)',
              'sidebar-border': 'var(--sidebar-border)',
              'sidebar-ring': 'var(--sidebar-ring)',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            },
            boxShadow: {
              'elegant': '0 2px 10px rgba(0, 0, 0, 0.03)',
            }
          }
        }
      }
    </script>
    <style>
      /* Claude Classic Design Tokens */
      :root {
        /* Light Mode: Warm Paper */
        --bg-primary: #F9F9F5;      
        --bg-secondary: #F0F0F0;    
        --surface: #FFFFFF;         
        --surface-hover: #F2F0E9;
        --text-primary: #1A1A1A;    
        --text-secondary: #6E6E6E;  
        --accent-primary: #1F8E98;  /* Perplexity Teal */
        --accent-hover: #1A6A76;
        --border: #E5E5E5;          
        --bubble-user: #F0F0F0;
        
        /* Sidebar Variables */
        --sidebar-background: #F9F9F5;
        --sidebar-foreground: #6E6E6E;
        --sidebar-primary: #1A1A1A;
        --sidebar-primary-foreground: #FFFFFF;
        --sidebar-accent: #E5E5E5;
        --sidebar-accent-foreground: #1A1A1A;
        --sidebar-border: #E5E5E5;
        --sidebar-ring: #21808D;
      }
      
      .dark {
        /* Dark Mode: Full Black & Deep Charcoal */
        --bg-primary: #191919;      /* Perplexity Dark */
        --bg-secondary: #121212;    /* Sidebar/Inputs */
        --surface: #202020;         /* Cards */
        --surface-hover: #2A2A2A;
        --text-primary: #ECECEC;    
        --text-secondary: #909090;  
        --accent-primary: #21808D;  /* New Teal */
        --accent-hover: #2999A8;
        --border: #333333;
        --bubble-user: #1A1A1A;     /* Specific dark bubble for user */
        
        /* Sidebar Variables Dark */
        --sidebar-background: #191919;
        --sidebar-foreground: #909090;
        --sidebar-primary: #21808D;
        --sidebar-primary-foreground: #FFFFFF;
        --sidebar-accent: #1F1F1F;
        --sidebar-accent-foreground: #ECECEC;
        --sidebar-border: #262626;
        --sidebar-ring: #21808D;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.01em;
      }

      /* Force standard font on controls */
      button, input, textarea, select {
        font-family: inherit;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 9999px;
      }
      
      /* Typography overrides for that editorial feel */
      .markdown-body {
        line-height: 1.7; 
        font-size: 16px; 
        color: var(--text-primary);
        font-family: 'Inter', sans-serif; /* Clean sans-serif for body */
      }
      
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        font-family: 'Instrument Serif', serif;
        font-weight: 500;
        margin-top: 2rem;
        margin-bottom: 1rem;
        color: var(--text-primary);
      }
      
      .markdown-body p {
        margin-bottom: 1.25rem;
        font-size: 1.05rem;
        line-height: 1.75;
      }

      .markdown-body strong {
        font-weight: 600;
        color: var(--text-primary);
      }

      /* Specific adjustments for sans-serif UI elements */
      .font-sans {
        font-family: 'Inter', sans-serif !important;
      }
      
      .font-serif {
        font-family: 'Instrument Serif', serif !important;
      }
      
      /* Updated Selection Color to Teal */
      ::selection {
        background: #21808D; 
        color: white;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",

    "recharts": "https://esm.sh/recharts@^2.12.0",

  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
