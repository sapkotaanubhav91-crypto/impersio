
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Impersio</title>
    <meta name="description" content="Impersio is a minimalist AI search engine." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23DA7756' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z' /%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              serif: ['"Instrument Serif"', 'Georgia', 'serif'],
            },
            colors: {
              background: 'var(--bg-primary)', 
              sidebar: 'var(--bg-secondary)',
              surface: 'var(--surface)',    
              'surface-hover': 'var(--surface-hover)', 
              border: 'var(--border)',     
              primary: 'var(--text-primary)',    
              muted: 'var(--text-secondary)',      
              'bubble-user': 'var(--bubble-user)',
              'scira-accent': 'var(--accent-primary)', 
              'scira-accent-hover': 'var(--accent-hover)',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            },
            boxShadow: {
              'elegant': '0 2px 10px rgba(0, 0, 0, 0.03)',
            }
          }
        }
      }
    </script>
    <style>
      /* Claude Classic Design Tokens */
      :root {
        /* Light Mode: Warm Paper */
        --bg-primary: #FAF8F5;      
        --bg-secondary: #F0F0F0;    
        --surface: #FFFFFF;         
        --surface-hover: #F2F0E9;
        --text-primary: #1A1A1A;    
        --text-secondary: #6E6E6E;  
        --accent-primary: #DA7756;  /* Terracotta Starburst */
        --accent-hover: #C36040;
        --border: #E5E5E5;          
        --bubble-user: #F0F0F0;
      }
      
      .dark {
        /* Dark Mode: Full Black & Deep Charcoal */
        --bg-primary: #000000;      /* Full Black Background */
        --bg-secondary: #121212;    /* Sidebar/Inputs */
        --surface: #181818;         /* Cards */
        --surface-hover: #222222;
        --text-primary: #ECECEC;    
        --text-secondary: #909090;  
        --accent-primary: #DA7756;  /* Same warm accent */
        --accent-hover: #E8886A;
        --border: #262626;
        --bubble-user: #1A1A1A;     /* Specific dark bubble for user */
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.01em;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 9999px;
      }
      
      /* Typography overrides for that editorial feel */
      .markdown-body {
        line-height: 1.7; 
        font-size: 16px; 
        color: var(--text-primary);
      }
      
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        font-family: 'Instrument Serif', serif;
        font-weight: 400;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
      }
      
      .markdown-body p {
        margin-bottom: 1rem;
        font-family: 'Instrument Serif', serif; /* Serif body text for AI */
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .markdown-body strong {
        font-weight: 600;
        color: var(--text-primary);
      }

      /* Specific adjustments for sans-serif UI elements */
      .font-sans {
        font-family: 'Inter', sans-serif !important;
      }
      
      ::selection {
        background: rgba(218, 119, 86, 0.3);
        color: inherit;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",

    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.90.1",
    "recharts": "https://esm.sh/recharts@^2.12.0",
    "pptxgenjs": "https://esm.sh/pptxgenjs@3.12.0"
  }
}
</script>
</head>

  </body>
</html>
