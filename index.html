
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Scira</title>
    <meta name="description" content="Scira is a minimalist AI search engine." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z' /%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              background: 'var(--bg-primary)', 
              sidebar: 'var(--bg-secondary)',
              surface: 'var(--surface)',    
              'surface-hover': 'var(--surface-hover)', 
              border: 'var(--border)',     
              primary: 'var(--text-primary)',    
              muted: 'var(--text-secondary)',      
              'bubble-user': 'var(--bubble-user)',
              'scira-accent': 'var(--accent-primary)', 
              'scira-accent-hover': 'var(--accent-hover)',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            },
            boxShadow: {
              'elegant': '0 2px 10px rgba(0, 0, 0, 0.03)',
            }
          }
        }
      }
    </script>
    <style>
      /* Scira Minimalist Design Tokens */
      :root {
        /* Light Mode */
        --bg-primary: #FFFFFF;      
        --bg-secondary: #F7F7F8;    
        --surface: #FFFFFF;         
        --surface-hover: #F4F4F5;
        --text-primary: #09090B;    
        --text-secondary: #71717A;  
        --accent-primary: #000000;  
        --accent-hover: #27272A;
        --border: #E4E4E7;          
        --bubble-user: #F4F4F5;
      }
      
      .dark {
        /* Dark Mode */
        --bg-primary: #09090B;      
        --bg-secondary: #121212;    
        --surface: #18181B;         
        --surface-hover: #27272A;
        --text-primary: #FAFAFA;    
        --text-secondary: #A1A1AA;  
        --accent-primary: #FFFFFF;  
        --accent-hover: #E4E4E7;
        --border: #27272A;
        --bubble-user: #18181B;     
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.015em;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 9999px;
      }
      
      .markdown-body {
        line-height: 1.6; 
        font-size: 15px; 
        color: var(--text-primary);
      }
      
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        font-weight: 500;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      
      .markdown-body p {
        margin-bottom: 1rem;
        font-size: 1rem;
        line-height: 1.7;
      }

      .markdown-body strong {
        font-weight: 600;
        color: var(--text-primary);
      }
      
      ::selection {
        background: rgba(255, 255, 255, 0.2);
        color: inherit;
      }
    </style>
<script type="importmap">
{
  "imports": {

    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.90.1",

}
